name: CI

on:
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Builds the provider, runs unit tests with the coverage check, and installs the
      # provider jar so the integration and conformance modules can resolve it
      - name: Build and unit tests
        run: mvn --batch-mode install -pl core -am

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Integration tests
        run: mvn --batch-mode verify -pl integration-tests -am -Pintegration-tests

  # Conformance runs serialize within one JVM, so we shard each test class to its own runner.
  # Emits the conformance test classes as a JSON array for the matrix below to fan out over.
  conformance-matrix:
    name: Conformance matrix
    runs-on: ubuntu-latest
    needs: build
    outputs:
      classes: ${{ steps.list.outputs.classes }}
    steps:
      - uses: actions/checkout@v6
      - id: list
        run: |
          classes=$(find conformance-tests/src/test/java -name '*ConformanceTest.java' \
            ! -name 'Abstract*' -exec basename {} .java \; | sort | jq -R . | jq -cs .)
          echo "classes=$classes" >> "$GITHUB_OUTPUT"

  conformance-tests:
    name: Conformance tests (${{ matrix.testClass }})
    runs-on: ubuntu-latest
    needs: conformance-matrix
    timeout-minutes: 60
    strategy:
      # Run every class even if one fails, so a single failing module does not mask the others.
      fail-fast: false
      matrix:
        testClass: ${{ fromJson(needs.conformance-matrix.outputs.classes) }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # -Dtest runs one conformance class. core is rebuilt by -am but its tests and coverage already
      # ran in the build job, so they are skipped here (the -Dtest filter would otherwise fail core).
      - name: Conformance test ${{ matrix.testClass }}
        run: >-
          mvn --batch-mode verify -pl conformance-tests -am -Pconformance-tests
          -Dtest=${{ matrix.testClass }}
          -Dsurefire.failIfNoSpecifiedTests=false
          -Djacoco.skip=true

  # Single required status check that succeeds only when every test job passes. For the sharded
  # conformance-tests matrix, needs.conformance-tests.result is success only if every shard passed.
  status-check:
    name: Status check
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - integration-tests
      - conformance-matrix
      - conformance-tests
    steps:
      - name: Verify all test jobs succeeded
        run: |
          results="${{ needs.build.result }} ${{ needs.integration-tests.result }} ${{ needs.conformance-matrix.result }} ${{ needs.conformance-tests.result }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" != "success" ]; then
              echo "At least one test job did not succeed"
              exit 1
            fi
          done
          echo "All test jobs succeeded"
