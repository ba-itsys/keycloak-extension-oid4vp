name: CI

on:
  pull_request:
    branches:
      - '**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Builds the provider, runs unit tests with the coverage check, and installs the
      # provider jar so the integration and conformance modules can resolve it
      - name: Build and unit tests
        run: mvn --batch-mode install -pl core -am

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Integration tests
        run: mvn --batch-mode verify -pl integration-tests -am -Pintegration-tests

  conformance-tests:
    name: Conformance tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # core is rebuilt by -am but its tests and coverage already ran in the build job, so they
      # are skipped here.
      - name: Conformance tests
        run: >-
          mvn --batch-mode verify -pl conformance-tests -am -Pconformance-tests
          -Djacoco.skip=true

  # Single required status check that succeeds only when every test job passes.
  status-check:
    name: Status check
    runs-on: ubuntu-latest
    if: always()
    needs:
      - build
      - integration-tests
      - conformance-tests
    steps:
      - name: Verify all test jobs succeeded
        run: |
          results="${{ needs.build.result }} ${{ needs.integration-tests.result }} ${{ needs.conformance-tests.result }}"
          echo "Job results: $results"
          for result in $results; do
            if [ "$result" != "success" ]; then
              echo "At least one test job did not succeed"
              exit 1
            fi
          done
          echo "All test jobs succeeded"
